    :root {
      --main-color: #2563eb;
      --bg-color: #f1f5f9;
      --card-color: #ffffff;
      --text-color: #1f2937;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
    }

    body {
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.7;
    }

    header {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      text-align: center;
      padding: 50px 20px 40px;
    }

    .profile-photo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffffff;
      margin-bottom: 15px;
    }

    header h1 {
      margin: 10px 0 5px;
      font-size: 2.2rem;
    }

    header p {
      margin: 0;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    main {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    section {
      background-color: var(--card-color);
      padding: 25px;
      border-radius: 14px;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    section h2 {
      margin-top: 0;
      color: var(--main-color);
      border-left: 6px solid var(--main-color);
      padding-left: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      font-size: 1.05rem;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>
